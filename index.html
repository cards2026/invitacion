<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🍻Ven a festejar!! 🍺</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&family=Courgette&display=swap" rel="stylesheet">
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        :root {
                --blue-main: #1e3a5f;     /* azul corporativo oscuro */
                --blue-secondary: #2c5282; /* azul elegante */
                --blue-accent: #4c7bbf;    /* azul vivo pero sobrio */
                --blue-soft: #a9c3e6;      /* azul claro suave */
                --text-light: #f5f5f5;
            }

        body {
            font-family: 'Quicksand', sans-serif;
            background: radial-gradient(circle at top, #1e3a5f, #0b1622 70%);
            color: var(--text-light);
            margin: 0;
        }

        .hero-section {
           min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .hero-section::after {
            content: "";
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 200px;
            background: linear-gradient(transparent, rgba(255, 204, 51, 0.1));
        }

        .hero-content {
            position: relative;
            z-index: 10;
            text-align: center;
            padding: 2rem;
            animation: fadeInUp 1.5s ease;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .main-title {
            font-family: 'Courgette', cursive;
            font-size: 3.5rem;
            color: var(--blue-soft);
            text-shadow: 0 0 10px rgba(169,195,230,0.6);
        }

        .invitacion-card {
            background: linear-gradient(145deg, rgba(20, 40, 70, 0.9), rgba(10, 20, 40, 0.95));
            border-radius: 20px;
            padding: 2.5rem;
            border: 1px solid rgba(76, 123, 191, 0.4);
            box-shadow: 0 0 25px rgba(30, 58, 95, 0.6);
        }

        .section-title {
            font-family: 'Courgette', cursive;
            font-size: 2.5rem;
            color: #f5f5f5;
            text-align: center;
            margin-bottom: 2rem;
            position: relative;
            display: inline-block;
        }        

        .btn-bee {
            background: linear-gradient(45deg, var(--blue-accent), var(--blue-secondary));
            color: #fff;
            border-radius: 50px;
            padding: 10px 20px;
            border: none;
        }

        .btn-bee:hover {
            box-shadow: 0 0 25px #42a5f5;
        }

        .floating {
            position: absolute;
            font-size: 2rem;
            animation: floatBeer 6s infinite ease-in-out;
            opacity: 0.8;
        }

        @keyframes floatBeer {
            0% {
                transform: translateY(0) rotate(-10deg);
            }

            50% {
                transform: translateY(-30px) rotate(10deg);
            }

            100% {
                transform: translateY(0) rotate(-10deg);
            }
        }

        .music-control {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 100;
        }

        

        @keyframes beat {

            0%,
            100% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.08);
            }
        }

        .btn-music {
            background: rgba(33, 150, 243, 0.2);
            color: #fff;
            border: 1px solid var(--blue-accent);
        }

        .btn-music:hover {
            box-shadow: 0 0 20px #ffcc33;
        }

        .bee-buzz {
            animation: buzz 0.5s ease-in-out;
        }

        @keyframes buzz {

            0%,
            100% {
                transform: translateX(0);
            }

            25% {
                transform: translateX(-5px);
            }

            75% {
                transform: translateX(5px);
            }
        }

        .bubble {
            background: rgba(33, 150, 243, 0.4);
        }

        @keyframes rise {
            0% {
                transform: translateY(0) scale(1);
                opacity: 0.6;
            }

            100% {
                transform: translateY(-100vh) scale(0.5);
                opacity: 0;
            }
        }

        body::before {
            content: "";
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            background: radial-gradient(circle, rgba(255, 0, 150, 0.15), transparent 70%);
            animation: clubLights 8s infinite alternate;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes clubLights {
            0% {
                background: radial-gradient(circle, rgba(255, 0, 150, 0.15), transparent 70%);
            }

            25% {
                background: radial-gradient(circle, rgba(0, 200, 255, 0.15), transparent 70%);
            }

            50% {
                background: radial-gradient(circle, rgba(255, 255, 0, 0.15), transparent 70%);
            }

            75% {
                background: radial-gradient(circle, rgba(0, 255, 150, 0.15), transparent 70%);
            }

            100% {
                background: radial-gradient(circle, rgba(255, 100, 0, 0.15), transparent 70%);
            }
        }

        .laser {
            position: fixed;
            width: 2px;
            height: 100%;
            background: linear-gradient(to bottom, transparent, #ff00ff, transparent);
            opacity: 0.4;
            animation: laserMove 3s linear infinite;
            z-index: 1;
        }

        .laser:nth-child(2) {
            left: 20%;
            animation-delay: 1s;
        }

        .laser:nth-child(3) {
            left: 40%;
            animation-delay: 2s;
        }

        .laser:nth-child(4) {
            left: 60%;
            animation-delay: 0.5s;
        }

        .laser:nth-child(5) {
            left: 80%;
            animation-delay: 1.5s;
        }

        .money {
            position: fixed;
            top: -50px;
            font-size: 2rem;
            animation: fallMoney 6s linear infinite;
            z-index: 2;
        }

        @keyframes fallMoney {
            0% {
                transform: translateY(-50px) rotate(0deg);
                opacity: 1;
            }

            100% {
                transform: translateY(110vh) rotate(360deg);
                opacity: 0;
            }
        }

        @keyframes laserMove {
            0% {
                transform: translateY(-100%);
            }

            100% {
                transform: translateY(100%);
            }
        }

        .postal-card {
            background: linear-gradient(145deg, #1b1b1b, #2a2a2a);
            border: 2px solid #4c7bbf;
            border-radius: 20px;
            box-shadow: 0 0 25px rgba(255, 204, 51, 0.5);
            overflow: hidden;
        }

        .img-postal {
            width: 100%;
            max-height: 600px;
            object-fit: contain;
            /* 🔥 evita que se corte */
            border-radius: 15px;
            margin-bottom: 1rem;
        }

        .postal-text {
            color: white;
            font-weight: bold;
            font-size: 1.2rem;
            text-shadow: 0 0 10px #42a5f5;
        }
    </style>
</head>

<body>
    <!-- Música de fondo -->
    <audio id="backgroundMusic" loop>
        <source src="audio/cancion.mp3" type="audio/mp3">
    </audio>

    <!-- Botón de música -->
    <div class="music-control">
        <button id="musicBtn" class="btn-music" onclick="startMusic()">
            <i class="fas fa-music fa-2x"></i>
        </button>
    </div>

    <!-- Sección Hero -->
    <section class="hero-section">
        <!-- flotantes -->
        <div class="floating" style="top: 10%; left: 5%;">🍺</div>
        <div class="floating" style="bottom: 20%; left: 10%;">🍺</div>

        <div class="floating" style="top: 20%; left: 28%;">🍻</div>

        <div class="floating" style="top: 12%; right: 20%;">🍺</div>

        <div class="floating" style="bottom: 25%; right: 5%;">🍻</div>

        <!-- Decoraciones de panal -->
        <div style="top: 15%; left: 15%; animation-delay: 1s;"></div>
        <div style="bottom: 20%; right: 15%; animation-delay: 2s;"></div>

        <div class="container">
            <div class="hero-content">

                <h1 class="main-title">🍾 ¡Birthday Party! 🍾</h1>

                <div class="invitacion-card">
                    <h3 class="section-title">🎉 Acompañanos a festejar a Angel 🎉</h3>
                    <p class="postal-text">
                        <br>  Te esperamos.... 🍻🔥<br>              
                    </p>

                    <div class="text-center">
                        <button class="btn btn-bee me-3 mb-3" onclick="showSurprise()">
                            <i class="fas fa-gift me-2"></i> Click para mas detalle...
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <div class="bubbles">
        <div class="bubble" style="left:5%; animation-delay:0s;"></div>
        <div class="bubble" style="left:15%; animation-delay:2s;"></div>
        <div class="bubble" style="left:25%; animation-delay:4s;"></div>
        <div class="bubble" style="left:35%; animation-delay:1s;"></div>
        <div class="bubble" style="left:45%; animation-delay:3s;"></div>
        <div class="bubble" style="left:55%; animation-delay:5s;"></div>
        <div class="bubble" style="left:65%; animation-delay:2s;"></div>
        <div class="bubble" style="left:75%; animation-delay:4s;"></div>
        <div class="bubble" style="left:85%; animation-delay:1s;"></div>
        <div class="bubble" style="left:95%; animation-delay:3s;"></div>
    </div>

    <div class="laser" style="left:10%"></div>
    <div class="laser" style="left:30%"></div>
    <div class="laser" style="left:50%"></div>
    <div class="laser" style="left:70%"></div>
    <div class="laser" style="left:90%"></div>

    <div class="money" style="left:10%">🍺</div>
    <div class="money" style="left:25%; animation-delay:1s;">🍻</div>
    <div class="money" style="left:40%; animation-delay:2s;">🍺</div>
    <div class="money" style="left:60%; animation-delay:3s;">🍻</div>
    <div class="money" style="left:80%; animation-delay:1.5s;">🍺</div>

    <!-- Modales -->
    <div class="modal fade" id="surpriseModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content postal-card">
                <div class="modal-header">
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body text-center">
                    <img src="images/postal.png" class="img-postal" alt="podtal">
                    <p class="postal-text">
                        ¡No Faltes!! 😎
                    </p>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>

        // Inicialización
        document.addEventListener('DOMContentLoaded', function () {
			startMusic();
        });

        // Funciones interactivas
        function startMusic() {
			const music = document.getElementById('backgroundMusic');
			const btn = document.getElementById('musicBtn');
			music.volume = 0.5;

			if (music.paused) {
				music.play().catch(() => {
					const playOnClick = () => {
						music.play();
						document.removeEventListener("click", playOnClick);
					};
					document.addEventListener("click", playOnClick);
				});

				btn.innerHTML = '<i class="fas fa-pause fa-2x"></i>';
			} else {
				music.pause();
				btn.innerHTML = '<i class="fas fa-music fa-2x"></i>';
			}
		}
	

        function showSurprise() {
            const modal = new bootstrap.Modal(document.getElementById('surpriseModal'));
            modal.show();
			
        }

        document.addEventListener('click', function () {
            const music = document.getElementById('backgroundMusic');
            const btn = document.getElementById('musicBtn');

            if (music.paused) {
                music.play();
                btn.innerHTML = '<i class="fas fa-pause"></i>';
            }
        }, { once: true });

        document.getElementById('backgroundMusic').volume = 0.5;
    </script>
</body>

</html>
