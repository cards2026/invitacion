<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invitación Ángel</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Montserrat', sans-serif;
    background: black;
    color: #e5e7eb;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
}

/* MATRIX */
canvas {
    position: absolute;
    top: 0;
    left: 0;
    z-index: 0;
}

/* CONFETI */
#confetti {
    pointer-events: none;
    z-index: 1;
}

/* CARD */
.card {
    position: relative;
    z-index: 2;
    width: 420px;
    padding: 40px;
    border-radius: 20px;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(10px);
    box-shadow: 0 0 40px rgba(34,197,94,0.3);
    text-align: center;
    border: 1px solid rgba(34,197,94,0.3);
}

h1 {
    font-family: 'Orbitron', sans-serif;
    font-size: 20px;
    letter-spacing: 2px;
    color: #22c55e;
}

h2 {
    font-size: 42px;
    margin: 10px 0;
    color: #facc15;
}

.icons {
    margin-top: 10px;
    font-size: 20px;
    letter-spacing: 8px;
}

.divider {
    width: 60px;
    height: 2px;
    background: #22c55e;
    margin: 20px auto;
}

.info {
    margin: 8px 0;
    font-size: 16px;
}

.highlight {
    margin-top: 20px;
    font-size: 15px;
    line-height: 1.6;
}

.beer {
    font-size: 24px;
    margin-top: 15px;
    animation: bounce 1.5s infinite alternate;
}

@keyframes bounce {
    from { transform: translateY(0);}
    to { transform: translateY(-6px);}
}
</style>
</head>

<body>

<canvas id="matrix"></canvas>
<canvas id="confetti"></canvas>

<div class="row card">
    <h1>✨ FELIZ CUMPLEAÑOS ✨</h1>
    <h2>Ángel</h2>

    <div class="icons">🎉 ✨ 🥂 ⚡ 🎶</div>

    <div class="divider"></div>

    <div class="info">Estás invitado</div>
    <div class="info"><strong>este viernes 17 de abril de 2026</strong></div>
    <div class="info">📍 La Camila</div>

    <div class="divider"></div>

    <div class="highlight">
        Los esperamos después de las 6:30 de la tarde.<br>
        ¡Así que vengan con energía y con ganas de pasarla genial!
    </div>

    <div class="beer">🍺 🥂 🍺</div>
</div>

<div class="row col-md-12">
	<!-- 🎵 MÚSICA -->
	<iframe width="100" height="315" 
	src="https://www.youtube.com/embed/Od-6uzcLGqw" 
	allowfullscreen>
	</iframe>
</div>

<script>
/* 🎶 ACTIVAR MÚSICA */
document.body.addEventListener("click", () => {
    const iframe = document.getElementById("player");
    iframe.src = "https://www.youtube.com/embed/Od-6uzcLGqw?autoplay=1&mute=0&loop=1&playlist=04fcgFs-mjA";
}, { once: true });

/* MATRIX */
const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");

canvas.height = window.innerHeight;
canvas.width = window.innerWidth;

const letters = "01";
const fontSize = 14;
const columns = canvas.width / fontSize;

const drops = [];
for (let x = 0; x < columns; x++) {
    drops[x] = 1;
}

function draw() {
    ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = "#22c55e";
    ctx.font = fontSize + "px monospace";

    for (let i = 0; i < drops.length; i++) {
        const text = letters.charAt(Math.floor(Math.random() * letters.length));
        ctx.fillText(text, i * fontSize, drops[i] * fontSize);

        if (drops[i] * fontSize > canvas.height && Math.random() > 0.975)
            drops[i] = 0;

        drops[i]++;
    }
}

setInterval(draw, 33);

/* 🎉 CONFETI MÁS GRANDE */
const confetti = document.getElementById("confetti");
const cctx = confetti.getContext("2d");

confetti.width = window.innerWidth;
confetti.height = window.innerHeight;

let particles = Array.from({length:80}, () => ({
    x: Math.random()*confetti.width,
    y: Math.random()*confetti.height,
    size: Math.random()*5+3, // 🔥 más grande
    speed: Math.random()*2+1
}));

function drawConfetti() {
    cctx.clearRect(0,0,confetti.width,confetti.height);
    particles.forEach(p=>{
        cctx.fillStyle=["#facc15","#22c55e","#38bdf8"][Math.floor(Math.random()*3)];
        cctx.fillRect(p.x,p.y,p.size,p.size);
        p.y+=p.speed;
        if(p.y>confetti.height){
            p.y=0;
            p.x=Math.random()*confetti.width;
        }
    });
}

function animate(){
    drawConfetti();
    requestAnimationFrame(animate);
}
animate();
</script>

</body>
</html>
